<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PERF MONITOR</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="widget" aria-label="Local performance monitor">
      <section class="glass-shell">
        <div class="scanline"></div>
        <header class="topbar drag-region">
          <div class="brand">
            <span class="status-dot" aria-hidden="true"></span>
            <span class="brand-text">PERF MONITOR</span>
          </div>
          <div class="top-meta">
            <span id="clock">--:--:--</span>
            <span class="meta-divider"></span>
            <span id="sample-state">LIVE</span>
          </div>
          <div class="window-actions no-drag">
            <button id="minimize-button" type="button" aria-label="Minimize">−</button>
            <button id="close-button" type="button" aria-label="Close">×</button>
          </div>
        </header>

        <div class="metrics-grid" id="metrics-grid"></div>

        <footer class="footer-line">
          <span id="hardware-note">Sensors active</span>
          <span class="pulse-bars" aria-hidden="true">
            <i></i><i></i><i></i><i></i><i></i>
          </span>
        </footer>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
